[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# API functions redirects
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Redirects for SPA routing (CATCH-ALL MUST BE LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment-specific settings
[context.production]
  environment = {  }

[context.deploy-preview]
  environment = { NODE_ENV = "preview" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }

# Functions configuration
[functions]
  node_bundler = "esbuild"
  
  # Set timeout for functions (max 26 seconds on free tier)
  [functions."auth-callback"]
    timeout = 10

  [functions."user-profile"]
    timeout = 10

[dev]
  port = 8888       # Netlify Dev server port
  targetPort = 4444 # Vite server port (from vite.config.ts)
  command = "npm run dev" 
  framework = "#custom"
